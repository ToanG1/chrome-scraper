services:
  serp-scraper:
    build: .
    ports:
      - "3000:3000"
      - "6080:6080"   # noVNC web UI
    shm_size: "2gb"        # Chrome needs this — default 64MB crashes it
    environment:
      - PORT=3000
      # Set PROXY_SERVER=host:port to route Chrome through a Japanese IP.
      # Required for raw uule=lat,lon to work — Google only accepts coordinates
      # when the request IP geolocation matches Japan.
      # Example: PROXY_SERVER=jp-proxy.example.com:8080
      - PROXY_SERVER=${PROXY_SERVER:-}
    restart: unless-stopped
